services:
  data_quality_tool:
    build:
      context: ./data_quality_tool
      dockerfile: Dockerfile
    ports:
      - "${DQT_PORT:-8000}:8000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
    healthcheck:
      test:
        ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  datacatalogdb:
    image: postgres:18.3
    volumes:
      - ./.stored_data/datacatalogdb:/var/lib/postgresql
    hostname: datacatalogdb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test}
    command: ["postgres", "-p", "5432"]
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "${BACKEND_PORT:-8090}:8090"
    environment:
      ### Database ###
      DB_URL: ${DB_URL:-jdbc:postgresql://datacatalogdb:5432/postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-test}
      ### Frontend ###
      PUBLIC_HOST: ${PUBLIC_HOST:-http://localhost}
      DQT_URL: ${DQT_URL:-http://data_quality_tool:8000}
      ### Keycloak ###
      AUTHENTICATION: ${AUTHENTICATION:-0}
      KEYCLOAK_AUTH_URL: ${KEYCLOAK_AUTH_URL:-https://iam.ebrains.eu/auth/}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-MIP}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-datacatalog}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      KEYCLOAK_SSL_REQUIRED: ${KEYCLOAK_SSL_REQUIRED:-none}
    depends_on:
      datacatalogdb:
        condition: service_healthy
      data_quality_tool:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/services/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
