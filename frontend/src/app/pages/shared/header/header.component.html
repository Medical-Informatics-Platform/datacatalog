<header class="header">
  <!-- Logo and Branding -->
  <div class="branding">
    <img src="assets/mip-logo.png" alt="Platform Logo" class="logo">
    <div class="branding-text">
      <h1>Medical Informatics Platform</h1>
    </div>
  </div>

  <!-- Desktop Navigation -->
  <div class="navbar-wrapper">
    <app-navbar></app-navbar>
  </div>

  <!-- Mobile hamburger button -->
  <button class="mobile-menu-btn" (click)="toggleMobileMenu()">
    ☰
  </button>

  <!-- User icon for login/logout -->
  <div class="user-icon">
    @if (isLoggedIn()) {
      <button class="sign-in-btn" [routerLink]="['/account']">
        <img src="assets/user-icon.png" alt="User Picture" class="account-picture">
      </button>
    } @else {
      <button class="sign-in-btn" (click)="login()">
        <img src="assets/grey-avatar.png" alt="Sign In" class="account-picture">
      </button>
    }
  </div>
</header>

<!-- Mobile slide-down menu -->
<div class="mobile-menu" [class.open]="menuOpen">
  <app-navbar></app-navbar>
</div>
