<header class="header">
  <a class="branding" routerLink="/" aria-label="Open MIP home">
    <img src="assets/mip-logo-short-compact.png" alt="MIP logo" class="logo">
  </a>

  <div class="navbar-wrapper">
    <app-navbar></app-navbar>
  </div>

  <button class="mobile-menu-btn" type="button" (click)="toggleMobileMenu()" aria-label="Toggle navigation">
    ☰
  </button>

  <div class="user-icon">
    @if (isLoggedIn()) {
      <button class="sign-in-btn" [routerLink]="['/account']">
        <img src="assets/user-icon.png" alt="User Picture" class="account-picture">
      </button>
    } @else {
      <button class="sign-in-btn" (click)="login()">
        <img src="assets/grey-avatar.png" alt="Sign In" class="account-picture">
      </button>
    }
  </div>
</header>

<div class="mobile-menu" [class.open]="menuOpen">
  <app-navbar></app-navbar>
</div>
