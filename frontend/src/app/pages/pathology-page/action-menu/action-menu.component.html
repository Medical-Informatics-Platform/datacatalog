<div class="action-menu" role="menu" aria-label="Action Menu">
  <!-- Three-dots button to open/close the menu -->
  <button
    class="btn btn-ghost btn-sm"
    aria-haspopup="true"
    [attr.aria-expanded]="menuVisible"
    aria-controls="options-menu"
    aria-label="Open actions menu"
    (click)="toggleMenu()"
  >
    <span class="material-icons">settings</span>
    Manage
  </button>

  <!-- Menu backdrop (only visible when menu is open) -->
  @if (menuVisible){
    <div class="menu-backdrop" (click)="toggleMenu()"></div>

  <!-- Options menu for actions -->
    <div class="options-menu" role="menu">
      <button class="menu-item" (click)="emitAction('add')" role="menuitem">
        <span class="material-icons">add</span>
        Add Pathology
      </button>
      @if(!isSelectedPathologyReleased){
        <button
          class="menu-item"
          (click)="emitAction('update')"
          role="menuitem"
        >
          <span class="material-icons">edit</span>
          Update Pathology
        </button>
        <button
          class="menu-item"
          (click)="emitAction('delete')"
          role="menuitem"
        >
          <span class="material-icons">delete</span>
          Delete Pathology
        </button>
        <button
          class="menu-item"
          (click)="emitAction('release')"
          role="menuitem"
        >
          <span class="material-icons">publish</span>
          Release Pathology
        </button>
      }
    </div>
  }
</div>
