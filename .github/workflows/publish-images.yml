name: Build & Push images on Push

on:
  release:
    types: [published]
    
env:
  DOCKERHUB_ORG: hbpmip
  APP: datacatalog

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push images with bake
        uses: docker/bake-action@v6
        with:
          files: .github/workflows/docker-bake.hcl
          targets: default
          push: true
          set: |
            backend.cache-from=type=registry,ref=${{ env.DOCKERHUB_ORG }}/${{ env.APP }}_backend:buildcache
            backend.cache-to=type=registry,ref=${{ env.DOCKERHUB_ORG }}/${{ env.APP }}_backend:buildcache,mode=max
            frontend.cache-from=type=registry,ref=${{ env.DOCKERHUB_ORG }}/${{ env.APP }}_frontend:buildcache
            frontend.cache-to=type=registry,ref=${{ env.DOCKERHUB_ORG }}/${{ env.APP }}_frontend:buildcache,mode=max
            data_quality_tool.cache-from=type=registry,ref=${{ env.DOCKERHUB_ORG }}/${{ env.APP }}_data_quality_tool:buildcache
            data_quality_tool.cache-to=type=registry,ref=${{ env.DOCKERHUB_ORG }}/${{ env.APP }}_data_quality_tool:buildcache,mode=max
        env:
          VERSION: ${{ env.VERSION }}

