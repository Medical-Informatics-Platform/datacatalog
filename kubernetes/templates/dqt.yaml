apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-quality-tool
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-quality-tool
  template:
    metadata:
      labels:
        app: data-quality-tool
    spec:
      containers:
      - name: dqt
        image: {{ printf "%s/datacatalog_data_quality_tool:%s" .Values.images.repository .Values.images.tag | quote }}
        ports:
        - containerPort: 8000
        env:
        - name: FLASK_ENV
          value: {{ .Values.dqt.flaskEnv | quote }}
        - name: FLASK_DEBUG
          value: {{ .Values.dqt.flaskDebug | quote }}
        startupProbe:
          httpGet:
            path: /
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          periodSeconds: 30
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: data-quality-tool
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: data-quality-tool
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
